<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Test POI Overpass</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{font-family:ui-sans-serif;margin:0;padding:16px;background:#0E2348;color:#EAF1FB}
button{padding:8px 12px;margin:4px;border:none;border-radius:6px;background:#3182ce;color:#fff;font-weight:600;cursor:pointer}
pre{background:#000;color:#0f0;padding:10px;border-radius:8px;font-size:12px;max-height:60vh;overflow:auto;white-space:pre-wrap}</style>
</head><body>
<h3>Test de chargement POI (Overpass API)</h3>
<p>Zone testée : autour de Toussus (48.6–48.8, 1.9–2.2). Cliquez pour tester chaque serveur.</p>
<button onclick="test(0)">Serveur 1 (kumi)</button>
<button onclick="test(1)">Serveur 2 (overpass-api.de)</button>
<button onclick="test(2)">Serveur 3 (private.coffee)</button>
<button onclick="testAll()">Tester tout (comme l app)</button>
<pre id="out">Prêt.</pre>
<script>
const EP=['https://overpass.kumi.systems/api/interpreter','https://overpass-api.de/api/interpreter','https://overpass.private.coffee/api/interpreter'];
const Q='[out:json][timeout:20];(nwr["man_made"="water_tower"](48.6,1.9,48.8,2.2);nwr["man_made"="tower"](48.6,1.9,48.8,2.2););out center 20;';
function log(m){const o=document.getElementById('out');o.textContent=(new Date().toLocaleTimeString())+' '+m+'\n'+o.textContent;}
async function test(i){
  const url=EP[i]; log('→ POST '+url+' …');
  const t0=Date.now();
  try{
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),20000);
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(Q),signal:ctrl.signal});
    clearTimeout(to);
    log('  HTTP '+res.status+' en '+((Date.now()-t0)/1000)+'s');
    if(res.ok){ const d=await res.json(); log('  ✓ '+(d.elements?d.elements.length:0)+' POI reçus'); }
    else { const txt=await res.text(); log('  ✗ corps: '+txt.slice(0,200)); }
  }catch(e){ log('  ✗ ERREUR: '+(e.name)+' — '+(e.message)); }
}
async function testAll(){ for(let i=0;i<EP.length;i++){ await test(i); } }
</script></body></html>
